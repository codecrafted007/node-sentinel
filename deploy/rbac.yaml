# Service accounts for the agent and controller.
#
# The agent reads the CRI socket and cgroups directly (not the kube API), so it
# needs no cluster RBAC. The controller stays observe-only by default; the
# ClusterRole below is only exercised when it runs with --remediate (issue #7),
# which emits Events on the offending pods (and reads pods to anchor them).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-sentinel-agent
  namespace: sentinel-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-sentinel-controller
  namespace: sentinel-system
---
# Remediation RBAC (issue #7): create Events on offending pods, read pods to
# anchor those Events / inspect their limits, and patch the pods/resize
# subresource for the in-place CPU throttle (with --resize). Cluster-scoped
# because offenders can be in any namespace. Intentionally minimal — still NO
# evict/delete and no patch of the pod spec proper, only the /resize subresource.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-sentinel-controller
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/resize"]
    verbs: ["patch"]
  - apiGroups: ["sentinel.io"]
    resources: ["nodehealthpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-sentinel-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-sentinel-controller
subjects:
  - kind: ServiceAccount
    name: node-sentinel-controller
    namespace: sentinel-system
